<h3 class="text-center">Let's Learn Template Form</h3>

<div class="border border-3 rounded-3 p-3 mt-3 offset-3 col-sm-5">
  <form #signupForm="ngForm" (submit)="submitMyForm(signupForm.value)">
    <p>
      FirstName:
      <input name="firstName" #firstName='ngModel' [(ngModel)]="myForm.firstName" required minlength="5" />

      @if (firstName.hasError('required')) {
        <span class="text-danger">FirstName is required</span>
      }
      @if (firstName.hasError('minlength')) {
        <span class="text-danger">FirstName should have minimum 5 chars</span>
      }
    </p>
    <p>
      LastName:
      <input name="lastName" #lastName='ngModel' [(ngModel)]="myForm.lastName" required />
    </p>
    <p>
      Email:
      <input name="email" ngModel />
    </p>
    <div ngModelGroup="address">
      <p>
        City:
        <input name="city" ngModel />
      </p>
      <p>
        state:
        <input name="state" ngModel />
      </p>
      <p>
        pincode:
        <input name="pincode" ngModel />
      </p>
    </div>

    <input type="reset" value="Reset" class="mx-2" />
    <input type="submit" value="Submit" [disabled]="signupForm.invalid" />

  </form>

  <pre>{{ signupForm.value | json }}</pre>
  <pre>{{ firstName.value }}</pre>
</div>
