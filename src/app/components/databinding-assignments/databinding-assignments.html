<h3 class="text-center">DataBinding Assignments</h3>

<div class="border border-2 rounded-2 p-2 m-2">
  <div>Have a paragraph and a toggle button; on clicking the button, control the visibility (Show / Hide) of the
    paragraph</div>

  <h1 [hidden]="flag">Helloooooooooo, Good Morning!!!!</h1>
  <button (click)="toggleFlag()" class="btn btn-primary"> {{ flag ? 'SHOW' : 'HIDE' }} </button>
</div>
