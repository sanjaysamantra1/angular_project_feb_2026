<h3 class="text-center">Product List</h3>

<p>
  <button class="btn btn-primary" (click)="openAlert()"> Alert</button>
  <button class="btn btn-success mx-2" (click)="openConfirm()"> Confirm</button>
  <button class="btn btn-primary" (click)="openSnackBar()"> Snackbar</button>
</p>


<div class="container" appDisablerightclick>
  <div class="row">
    <div class="col-sm-3">
      <select (change)="filterProducts($event)" class='form-control'>
        @for (categoryItem of categorySet; track $index) {
        <option>{{categoryItem}}</option>
        }
      </select>
    </div>
    <div class="col-sm-6">
      <input appTextonly appDisablepaste type="search" (input)="searchProducts($event)"
                      class="form-control" placeholder="Search..." >
    </div>
    <div class="col-sm-3">
        <button class="btn btn-primary mx-1" (click)="sortAsc()">Sort Asc</button>
        <button class="btn btn-secondary" (click)="sortDesc()">Sort Desc</button>
    </div>
  </div>
  <div class="row mt-2">
    @for (product of productArr | paginate: { itemsPerPage: 4, currentPage: p}; track $index) {
    <div class="col-sm-3 card">
      <img src="{{product.image}}" class="card-img-top" alt="..." style="height: 150px;">
      <div class="card-body text-center" appZoomin>
        <h5 class="card-title">{{product.category}}</h5>
        <p class="card-text text-truncate">{{product.title}}</p>
        <p class="card-text text-truncate">{{product.description}}</p>
        <p class="card-text">{{product.price}}</p>
        <p class="card-text">
          {{product.rating.rate}}
          <fa-icon [icon]="faStar"></fa-icon>
        </p>
        <button class="btn btn-primary mx-1" routerLink="/productdetails"
            [queryParams]="{id:product.id,title:product.title,price:product.price}">Details</button>
      </div>
    </div>
    }
  </div>
  <div class="row mt-2">
    <div class="col-sm-5 offset-3">
      <pagination-controls (pageChange)="p = $event"></pagination-controls>
    </div>
  </div>
</div>
