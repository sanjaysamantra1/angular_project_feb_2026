<div class="row text-center border border-2 p-2 mt-2">
  <div>I am Parent Component</div>
  <div>My own data a: {{a}}</div>
  <div>My child2 data b:{{child2.b}}</div>
  <div>My child2 data c:{{child2.c}}</div>
  <div>Cars: {{carsParent}}</div>

  <div class="col-sm-6 border border-2 p-2">
    <app-child1 [a]="a" [b]="child2.b" (carsEvent)="receiveCarsData($event)"></app-child1>
  </div>
  <div class="col-sm-6 border border-2 p-2">
    <app-child2 [aChild2]="a" #child2 [cars]="carsParent"></app-child2>
  </div>
</div>
